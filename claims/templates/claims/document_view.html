{% extends "base.html" %}

{% block title %}View Document{% endblock %}

{% block content %}
<div class="container-fluid px-4 py-3">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h5 class="mb-1">Document Preview</h5>
            <p class="text-muted mb-0">{{ document.file.name }}</p>
        </div>
        <a href="{{ document.file.url }}" class="btn btn-outline-primary btn-sm" target="_blank" rel="noopener">
            Open File
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0" style="height: 80vh;">
            <iframe src="{{ document.file.url }}" title="Document Preview"
                style="border:0; width:100%; height:100%;"></iframe>
        </div>
    </div>
</div>
{% endblock %}
