{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Complete — ClaimIQ</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; background: #0a1628; color: white; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 40px 20px; background-image: radial-gradient(circle at 15% 50%, rgba(26, 110, 245, 0.08), transparent 25%), radial-gradient(circle at 85% 30%, rgba(26, 110, 245, 0.08), transparent 25%); }
        .auth-wrapper { width: 100%; max-width: 500px; background: #111c35; border-radius: 20px; padding: 50px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); border: 1px solid #1f335c; text-align: center; }
        .icon-box { width: 80px; height: 80px; background: rgba(0, 198, 100, 0.1); border: 1px solid rgba(0, 198, 100, 0.2); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 30px; color: #00c664; font-size: 32px; }
        h2 { font-family: 'DM Serif Display', serif; font-size: 32px; margin-bottom: 15px; }
        p { color: #9fb3d1; margin-bottom: 35px; font-size: 15px; line-height: 1.6; }
        .btn-reset { width: 100%; padding: 14px; border: none; border-radius: 8px; background: #1a6ef5; color: white; font-weight: 600; font-size: 15px; cursor: pointer; transition: all 0.3s ease; display: flex; justify-content: center; align-items: center; gap: 10px; text-decoration: none; }
        .btn-reset:hover { background: #3d8bff; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(26, 110, 245, 0.3); color: white; }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="icon-box">
            <i class="bi bi-shield-check"></i>
        </div>
        <h2>Success!</h2>
        <p>Your password has been reset successfully. You can now use your new password to sign in to your account.</p>
        
        <a href="{% url 'accounts:login' %}" class="btn-reset">
            Proceed to Login <i class="bi bi-box-arrow-in-right"></i>
        </a>
    </div>
</body>
</html>
