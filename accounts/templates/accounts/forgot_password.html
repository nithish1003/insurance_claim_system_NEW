{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ClaimIQ — Reset Password</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

<style>

body {
    font-family: 'DM Sans', sans-serif;
    background: #0a1628;
    color: white;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 20px;
    background-image: 
        radial-gradient(circle at 50% 10%, rgba(26, 110, 245, 0.08), transparent 35%),
        radial-gradient(circle at 10% 90%, rgba(26, 110, 245, 0.05), transparent 25%);
}

.auth-wrapper {
    width: 100%;
    max-width: 500px;
    background: #111c35;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    border: 1px solid #1f335c;
    position: relative;
    padding: 50px 40px;
}

.auth-wrapper::before {
    content: '';
    position: absolute;
    top: -100px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(26,110,245,0.15) 0%, rgba(0,0,0,0) 70%);
    border-radius: 50%;
    z-index: 0;
}

.content-wrapper {
    position: relative;
    z-index: 1;
    text-align: center;
}

.reset-icon {
    width: 70px;
    height: 70px;
    background: rgba(26, 110, 245, 0.15);
    color: #3d8bff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    margin: 0 auto 25px;
    border: 1px solid rgba(26, 110, 245, 0.3);
    box-shadow: 0 10px 25px rgba(26, 110, 245, 0.2);
}

.auth-wrapper h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 34px;
    margin-bottom: 10px;
    color: white;
}

.auth-wrapper p.subtitle {
    color: #9fb3d1;
    margin-bottom: 35px;
    font-size: 15px;
    line-height: 1.6;
}

.form-label {
    color: #9fb3d1;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 6px;
    display: block;
    text-align: left;
}

.form-control {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: white;
    border-radius: 8px;
    padding: 14px 15px;
    transition: all 0.3s ease;
}

.form-control:focus {
    background: rgba(255,255,255,0.08);
    border-color: #1a6ef5;
    color: white;
    outline: none;
    box-shadow: 0 0 0 4px rgba(26, 110, 245, 0.15);
}

.form-control::placeholder {
    color: rgba(255,255,255,0.2);
}

.btn-reset {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 8px;
    background: #1a6ef5;
    color: white;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    margin-top: 25px;
    transition: all 0.3s ease;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
}

.btn-reset:hover {
    background: #3d8bff;
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(26, 110, 245, 0.3);
}

.auth-footer {
    margin-top: 30px;
    font-size: 14px;
    color: #7a8ba8;
}

.auth-footer a {
    color: #3d8bff;
    text-decoration: none;
    font-weight: 600;
    transition: 0.3s ease;
    display: inline-flex;
    align-items: center;
    gap: 5px;
}

.auth-footer a:hover {
    color: white;
}

.auth-footer a i {
    transition: transform 0.3s ease;
}

.auth-footer a:hover i {
    transform: translateX(-4px);
}
</style>

</head>

<body>

<div class="auth-wrapper">

    <div class="content-wrapper">
        
        <div class="reset-icon">
            <i class="bi bi-shield-lock"></i>
        </div>

        <h2>Forgot Password?</h2>
        <p class="subtitle">Enter the email address associated with your account and we'll send you a secure link to reset your password.</p>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3 text-start">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" required placeholder="Enter your registered email">
            </div>

            <button type="submit" class="btn-reset">
                Send Reset Link <i class="bi bi-send"></i>
            </button>

        </form>

        <div class="auth-footer">
            <a href="{% url 'accounts:login' %}">
                <i class="bi bi-arrow-left"></i> Back to Sign In
            </a>
        </div>

    </div>

</div>

</body>
</html>
