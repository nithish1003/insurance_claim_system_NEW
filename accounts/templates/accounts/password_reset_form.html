{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — ClaimIQ</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            background: #0a1628;
            color: white;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(26, 110, 245, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(26, 110, 245, 0.08), transparent 25%);
        }
        .auth-wrapper {
            width: 100%;
            max-width: 500px;
            background: #111c35;
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            border: 1px solid #1f335c;
            text-align: center;
        }
        .icon-box {
            width: 80px;
            height: 80px;
            background: rgba(26, 110, 245, 0.1);
            border: 1px solid rgba(26, 110, 245, 0.2);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            color: #3d8bff;
            font-size: 32px;
        }
        h2 {
            font-family: 'DM Serif Display', serif;
            font-size: 32px;
            margin-bottom: 15px;
        }
        p {
            color: #9fb3d1;
            margin-bottom: 35px;
            font-size: 15px;
            line-height: 1.6;
        }
        .form-label {
            color: #9fb3d1;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            display: block;
            text-align: left;
        }
        .form-control {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            border-radius: 8px;
            padding: 14px 15px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            background: rgba(255,255,255,0.08);
            border-color: #1a6ef5;
            color: white;
            outline: none;
            box-shadow: 0 0 0 4px rgba(26, 110, 245, 0.15);
        }
        .btn-reset {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: #1a6ef5;
            color: white;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .btn-reset:hover {
            background: #3d8bff;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(26, 110, 245, 0.3);
        }
        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: #7a8ba8;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s ease;
        }
        .back-link:hover {
            color: white;
        }
        .errorlist {
            list-style: none;
            padding: 0;
            margin: 0 0 15px 0;
            color: #ff6b81;
            font-size: 13px;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="icon-box">
            <i class="bi bi-shield-lock"></i>
        </div>
        <h2>Forgot Password?</h2>
        <p>No worries! Enter your registered email and we'll send you instructions to reset your password.</p>
        
        <form method="POST">
            {% csrf_token %}
            <div>
                <label class="form-label" for="id_email">Email Address</label>
                {{ form.email }}
                {% if form.email.errors %}
                    <div class="errorlist">{{ form.email.errors }}</div>
                {% endif %}
            </div>
            <button type="submit" class="btn-reset">
                Send Reset Link <i class="bi bi-send-fill"></i>
            </button>
        </form>
        
        <a href="{% url 'accounts:login' %}" class="back-link">
            <i class="bi bi-arrow-left"></i> Back to Login
        </a>
    </div>

    <script>
        // Apply bootstrap classes to django generated input
        document.addEventListener('DOMContentLoaded', function() {
            var emailInput = document.getElementById('id_email');
            if (emailInput) {
                emailInput.classList.add('form-control');
                emailInput.setAttribute('placeholder', 'e.g. name@company.com');
            }
        });
    </script>
</body>
</html>
