{% extends "base.html" %}

{% block title %}Edit Profile — InsureCRM{% endblock %}

{% block extra_css %}
<style>
.edit-container {
    max-width: 800px;
    margin: 0 auto;
}
.edit-card {
    background: #111c35;
    border: 1px solid #1f335c;
    border-radius: 16px;
    padding: 40px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.4);
}
.form-label {
    color: #9fb3d1;
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 8px;
}
.form-control {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: white;
    border-radius: 10px;
    padding: 12px 16px;
    transition: all 0.3s ease;
}
.form-control:focus {
    background: rgba(255, 255, 255, 0.08);
    border-color: #1a6ef5;
    box-shadow: 0 0 0 4px rgba(26, 110, 245, 0.2);
    color: white;
}
.btn-save {
    background: #1a6ef5;
    border: none;
    padding: 12px 30px;
    border-radius: 10px;
    font-weight: 600;
    transition: all 0.3s ease;
}
.btn-save:hover {
    background: #3d8bff;
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(26, 110, 245, 0.4);
}
.btn-cancel {
    background: transparent;
    border: 1px solid #1f335c;
    color: #9fb3d1;
    padding: 12px 30px;
    border-radius: 10px;
}
.btn-cancel:hover {
    background: rgba(255, 255, 255, 0.05);
    color: white;
}
</style>
{% endblock %}

{% block breadcrumb %}
Edit Profile
{% endblock %}

{% block content %}
<div class="edit-container">
    <div class="edit-card">
        <h3 class="text-white mb-4"><i class="bi bi-pencil-square me-2 text-primary"></i> Edit My Profile</h3>
        
        <form method="POST">
            {% csrf_token %}
            
            <div class="row g-4">
                <div class="col-md-6">
                    <label class="form-label">First Name</label>
                    <input type="text" name="first_name" class="form-control" value="{{ form.first_name.value|default:'' }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Last Name</label>
                    <input type="text" name="last_name" class="form-control" value="{{ form.last_name.value|default:'' }}" required>
                </div>
                
                <div class="col-md-12">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" value="{{ form.email.value|default:'' }}" required>
                </div>
                
                <div class="col-md-12">
                    <label class="form-label">Phone Number</label>
                    <input type="text" name="phone" class="form-control" value="{{ form.phone.value|default:'' }}" required>
                </div>
                
                <div class="col-md-12">
                    <label class="form-label">Residential Address</label>
                    <textarea name="address" class="form-control" rows="3" required>{{ form.address.value|default:'' }}</textarea>
                </div>
                
                <div class="col-md-12 mt-5 d-flex gap-3">
                    <button type="submit" class="btn btn-save text-white">Save Changes</button>
                    <a href="{% url 'accounts:profile' %}" class="btn btn-cancel">Cancel</a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
